<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Yandex Games</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas.emscripten {
      border: 0 none;
      background-color: #000;
      display: block;
      max-width: none;
      max-height: none;
      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>

  <script async src="/sdk.js" onload="initSDK()"></script>
  <script>
    var ysdk = null;
    var sdkReady = false;
    var runtimeReady = false;
    var assetsReady = false;
    var yandexReadySent = false;

    function tryNotifyYandexReady() {
      if (yandexReadySent || !sdkReady || !runtimeReady || !assetsReady || !window.ysdk || !window.ysdk.features) {
        return;
      }

      try {
        if (window.ysdk.features.LoadingAPI && typeof window.ysdk.features.LoadingAPI.ready === "function") {
          console.log("Yandex SDK: Sending ready() via LoadingAPI");
          window.ysdk.features.LoadingAPI.ready();
          yandexReadySent = true;
          return;
        }

        if (window.ysdk.features.LoadingProgress && typeof window.ysdk.features.LoadingProgress.ready === "function") {
          console.log("Yandex SDK: Sending ready() via LoadingProgress fallback");
          window.ysdk.features.LoadingProgress.ready();
          yandexReadySent = true;
          return;
        }

        console.warn("Yandex SDK: loading API is unavailable");
      } catch (e) {
        console.error("Yandex SDK: ready() failed", e);
      }
    }

    async function initSDK() {
      try {
        ysdk = await YaGames.init();
        window.ysdk = ysdk;
        sdkReady = true;
        console.log("Yandex Games SDK Initialized");
        tryNotifyYandexReady();
      } catch (e) {
        console.error("Yandex Games SDK init failed:", e);
      }
    }
  </script>
</head>

<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <script type="text/javascript">
    function resizeCanvasElement() {
      var canvas = document.getElementById("canvas");
      if (!canvas) return;

      var baseWidth = 960;
      var baseHeight = 720;
      var scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);

      canvas.style.width = (baseWidth * scale) + "px";
      canvas.style.height = (baseHeight * scale) + "px";

      var dpr = window.devicePixelRatio || 1;
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
    }

    var Module = {
      preRun: [],
      postRun: [],
      onRuntimeInitialized: function () {
        runtimeReady = true;
        console.log("Game Engine Ready");
        tryNotifyYandexReady();
      },
      print: function (text) {
        console.log(text);
      },
      printErr: function (text) {
        console.error(text);
      },
      canvas: (function () {
        var canvas = document.getElementById("canvas");
        canvas.addEventListener("webglcontextlost", function (e) {
          alert("WebGL context lost. You will need to reload the page.");
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function (text) {
        console.log("status: " + text);
      },
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");

        if (left === 0) {
          assetsReady = true;
          tryNotifyYandexReady();
        }
      },
      onAbort: function (reason) {
        console.error("Emscripten abort:", reason);
      }
    };

    window.addEventListener("resize", resizeCanvasElement);
    resizeCanvasElement();
    Module.setStatus("Downloading...");
    window.onerror = function (message, source, lineno, colno, error) {
      Module.setStatus("Exception thrown, see JavaScript console");
      console.error("window.onerror:", message, source, lineno, colno, error);
      Module.setStatus = function (text) {
        if (text) {
          Module.printErr("[post-exception status] " + text);
        }
      };
    };
  </script>

  {{{ SCRIPT }}}
</body>

</html>
